<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zylon By A.H | F1 MISSION CONTROL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.0.3/css/flag-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap');
        :root {
            --f1-red: #e10600; --f1-purple: #b700ff; --f1-green: #00ff88;
            --f1-yellow: #ffd200; --bg: #050505; --panel: #111111; --text-dim: #888;
            --soft: #ff1e1e; --medium: #f9d71c; --hard: #ffffff;
        }
        body { background: var(--bg); color: #fff; font-family: 'Titillium Web', sans-serif; margin: 0; overflow: hidden; }

        header { background: #000; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; }
        .z-brand { display: flex; align-items: center; gap: 15px; }
        .z-logo { background: var(--f1-red); color: #fff; padding: 6px 14px; font-weight: 900; border-radius: 2px; font-style: italic; font-size: 1.4rem; }
        .z-title { color: #fff; font-weight: 900; text-transform: uppercase; font-size: 1.1rem; }

        .tab-nav { display: flex; background: #000; padding: 0 40px; border-bottom: 2px solid #222; }
        .tab-item { padding: 12px 25px; cursor: pointer; font-weight: 900; font-size: 0.8rem; letter-spacing: 1px; color: var(--text-dim); border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-item.active { color: #fff; border-bottom: 3px solid var(--f1-red); background: rgba(225, 6, 0, 0.05); }

        .tyre-badge { display: inline-block; width: 16px; height: 16px; border-radius: 50%; border: 2px solid currentColor; text-align: center; font-size: 9px; line-height: 16px; font-weight: 900; margin-right: 8px; }

        #status-strip { padding: 8px; font-weight: 900; text-align: center; font-size: 0.8rem; letter-spacing: 3px; transition: 0.5s; text-transform: uppercase; }
        .status-green { background: var(--f1-green); color: #000; }
        .status-yellow { background: var(--f1-yellow); color: #000; }
        .status-red { background: var(--f1-red); color: #fff; }

        .telemetry-bar { display: grid; grid-template-columns: 1.5fr 1fr 1.5fr; padding: 20px 40px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; align-items: center; }
        .timer-val { font-size: 2.2rem; font-weight: 900; line-height: 1; font-family: 'JetBrains Mono', monospace; }

        .container { padding: 20px 40px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
        th { color: #555; font-size: 0.65rem; text-transform: uppercase; padding: 10px; text-align: left; }
        tbody tr { background: var(--panel); transition: 0.3s; }
        tbody tr:hover { background: #1d1d1d; transform: translateX(10px); outline: 1px solid #333; }
        td { padding: 14px 10px; font-weight: 700; border-top: 1px solid #1a1a1a; }
        .time-cell { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; }
        .purple-blink { color: var(--f1-purple); animation: purple-pulse 1.2s infinite; }
        @keyframes purple-pulse { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<header>
    <div class="z-brand">
        <div class="z-logo">Z</div>
        <div class="z-title">ZYLON Formula 1 Live</div>
    </div>
    <a href="index.html" class="btn-home" style="background:#1a1a1a; color:#fff; text-decoration:none; padding:8px 20px; border-radius:4px; font-size:0.75rem; font-weight:700; border:1px solid #333;">BACK TO DASHBOARD</a>
</header>

<div class="tab-nav">
    <div id="tab-race" class="tab active" onclick="setSession('RACE')">RACE</div>
<div id="tab-qual" class="tab" onclick="setSession('QUALIFYING')">QUALIFYING</div>   
</div>

<!-- TRACK STATUS -->
<div id="status-strip" class="status-green">🏁 TRACK CLEAR</div>

<div class="telemetry-bar">
    <!-- WEATHER (LIVE UPDATED) -->
    <div class="weather-stats" id="weather-status" style="display:flex; gap:20px; font-size:0.8rem; color:var(--text-dim);">
        <span>AIR <b>—</b></span>
        <span>TRACK <b>—</b></span>
        <span>—</span>
        <span>GRIP <b>—</b></span>
    </div>

    <!-- SESSION TIMER -->
    <div class="session-timer" style="text-align:center;">
        <div style="color:var(--f1-green); font-size:0.7rem; font-weight:900; letter-spacing:4px;">
            ● <span id="sess-label">LOADING</span>
        </div>
        <div class="timer-val" id="sess-timer">--:--</div>
    </div>

    <!-- CIRCUIT INFO -->
    <div class="circuit-info" style="text-align:right;">
        <div id="round-name" style="color:var(--f1-red); font-weight:900; font-size:0.75rem; letter-spacing:1px;">
            ROUND — 
        </div>
        <div id="circuit-name" style="color:#fff; font-weight:900; font-size:1.1rem;">
            —
        </div>
    </div>
</div>

<div class="container">
    <table>
        <thead>
            <tr id="table-headers"></tr>
        </thead>
        <tbody id="leaderboard"></tbody>
    </table>
</div>

<script src="live-engine.js"></script>
</body>

</html>
